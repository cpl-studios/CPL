<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>CPL</title>

<link rel="icon" href="DDB68CF8-B74C-4DDE-8C35-A26D8721C2DA.jpeg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    font-family:'IBM Plex Mono', monospace;
    text-transform:uppercase;
    overflow:hidden;
}

/* SITE */
#site{
    width:100%;
    height:100%;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:24px 32px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:24px;
    cursor:pointer;
    opacity:0.8;
    transition:0.3s;
}

nav a:hover{
    opacity:0.3;
}

/* PAGES */
.page{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    opacity:0;
    visibility:hidden;
    transform:translateY(10px);
    transition:0.5s ease;
}

.page.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

/* HOME */
.home-title{
    font-size:clamp(4rem,12vw,10rem);
    letter-spacing:0.08em;
}

/* SHOP */
.shop-text{
    font-size:1rem;
    opacity:0.7;
}

/* MUSIC */
.music h1{
    font-size:2rem;
    margin-bottom:20px;
}

.music p{
    margin:6px 0;
    opacity:0.8;
}

.presave{
    margin-top:20px;
    padding:10px 18px;
    border:1px solid #fff;
    text-decoration:none;
    color:#fff;
    transition:0.3s;
}

.presave:hover{
    background:#fff;
    color:#000;
}
</style>
</head>

<body>

<div id="site">

    <!-- NAV -->
    <nav>
        <div>CPL</div>
        <div>
            <a onclick="showPage('home')">Home</a>
            <a onclick="showPage('shop')">Shop</a>
            <a onclick="showPage('music')">Music</a>
        </div>
    </nav>

    <!-- HOME -->
    <div id="home" class="page active">
        <div class="home-title">CPL</div>
    </div>

    <!-- SHOP -->
    <div id="shop" class="page">
        <div class="shop-text">CPL SHOP COMING SOON</div>
    </div>

    <!-- MUSIC -->
    <div id="music" class="page">
        <div class="music">
            <h1>TXY // TXY</h1>
            <p>PRE-SAVE</p>
            <p>RELEASE DATE</p>
            <p>10 07 26</p>

            <a class="presave" href="#">PRE-SAVE</a>
        </div>
    </div>

</div>

<script>
function showPage(id){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
